name: Trump Truth Social Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore sent posts cache
        uses: actions/cache/restore@v4
        with:
          path: sent_posts.json
          key: sent-posts-dummy
          restore-keys: sent-posts-

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trump_monitor.py

      - name: Save sent posts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_posts.json
          key: sent-posts-${{ github.run_id }}
